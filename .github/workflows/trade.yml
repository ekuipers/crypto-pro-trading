name: Trading Bot

on:
  schedule:
    # Hourly evaluation — runs at :00 every hour, 24x per day (UTC)
    - cron: "0 * * * *"
    # Daily journal summary — runs at 23:00 UTC
    - cron: "0 23 * * *"
  # Allow manual trigger from the GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no orders placed)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  evaluate:
    name: Hourly Evaluation
    runs-on: ubuntu-latest
    # Skip the 23:00 run here — the journal job below handles that hour
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'

    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      APCA_BASE_URL: ${{ secrets.APCA_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running in dry-run mode (no orders)"
            python scripts/run_evaluation.py
          else
            echo "Running with order execution enabled"
            python scripts/run_evaluation.py --execute
          fi

      - name: Commit journal entry
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@alpaca-trading"
          git add journal/
          git diff --cached --quiet || git commit -m "journal: hourly evaluation $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  journal:
    name: Daily Journal Summary
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 23 * * *'

    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      APCA_BASE_URL: ${{ secrets.APCA_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation (final hour)
        run: python scripts/run_evaluation.py --execute

      - name: Commit journal entry
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@alpaca-trading"
          git add journal/
          git diff --cached --quiet || git commit -m "journal: daily summary $(date -u '+%Y-%m-%d')"
          git push
