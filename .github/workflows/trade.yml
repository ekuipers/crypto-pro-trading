name: Trading Bot

on:
  schedule:
    - cron: "30 * * * *"   # elke 30 min (UTC)
    - cron: "0 23 * * *"     # daily summary (UTC)
  workflow_dispatch:
    inputs:
      environment:
        description: "Trading environment"
        required: true
        default: "paper"
        type: choice
        options: [paper, live]
      dry_run:
        description: "Dry run (no orders placed)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# Voorkom gelijktijdige runs die allebei naar main proberen te pushen.
# Concurrency zorgt dat er max 1 run tegelijk actief/pending is per group. [2](https://docs.github.com/en/enterprise-cloud@latest/actions/how-tos/write-workflows/choose-when-workflows-run/control-workflow-concurrency)
concurrency:
  group: trading-bot-${{ github.ref }}
  cancel-in-progress: false

# Minimaal benodigde rechten om commits te kunnen pushen. [4](https://docs.github.com/en/actions/tutorials/authenticate-with-github_token)
permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  evaluate:
    name: Evaluate
    runs-on: ubuntu-latest

    # Run voor manual dispatch, skip de 15-min schedule (de journal job draait op het uur) 
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *')

    # Inputs bestaan alleen bij workflow_dispatch; bij schedule zijn ze null. [1](https://stackoverflow.com/questions/72539900/schedule-trigger-github-action-workflow-with-input-parameters)
    # Daarom kiezen we veilig een default:
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'paper' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # nodig voor rebase/pull met volledige history [3](https://code.alazhar.dev/actions/checkout)
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure trading env vars
        run: |
          # Determine runtime env: manual uses input; schedule defaults to paper.
          ENV="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'paper' }}"
          echo "TRADING_ENV=$ENV" >> "$GITHUB_ENV"

          if [ "$ENV" = "live" ]; then
            echo "APCA_BASE_URL=https://api.alpaca.markets" >> "$GITHUB_ENV"

            # Prefer “clean” env-scoped secret names if you have them:
            #   APCA_API_KEY_ID / APCA_API_SECRET_KEY
            # Fallback to your old names if needed:
            echo "APCA_API_KEY_ID=${{ secrets.APCA_API_KEY_ID || secrets.APCA_LIVE_KEY_ID }}" >> "$GITHUB_ENV"
            echo "APCA_API_SECRET_KEY=${{ secrets.APCA_API_SECRET_KEY || secrets.APCA_LIVE_SECRET_KEY }}" >> "$GITHUB_ENV"
          else
            echo "APCA_BASE_URL=https://paper-api.alpaca.markets" >> "$GITHUB_ENV"
            echo "APCA_API_KEY_ID=${{ secrets.APCA_API_KEY_ID || secrets.APCA_PAPER_KEY_ID }}" >> "$GITHUB_ENV"
            echo "APCA_API_SECRET_KEY=${{ secrets.APCA_API_SECRET_KEY || secrets.APCA_PAPER_SECRET_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Validate credentials
        run: |
          missing=0
          [ -z "$APCA_API_KEY_ID" ] && echo "ERROR: APCA_API_KEY_ID is empty" && missing=1
          [ -z "$APCA_API_SECRET_KEY" ] && echo "ERROR: APCA_API_SECRET_KEY is empty" && missing=1
          [ -z "$APCA_BASE_URL" ] && echo "ERROR: APCA_BASE_URL is empty" && missing=1
          [ $missing -eq 1 ] && exit 1
          echo "Credentials present. ENV=$TRADING_ENV BASE_URL=$APCA_BASE_URL"

      - name: Run evaluation
        run: |
          DRY="${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}"
          if [ "$DRY" = "true" ]; then
            echo "Dry run: no orders"
            python scripts/run_evaluation.py
          else
            echo "Execute enabled"
            python scripts/run_evaluation.py --execute
          fi

      - name: Commit & push journal (safe)
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@alpaca-trading"

          # Only commit when there are changes
          git add journal/
          git diff --cached --quiet && { echo "No journal changes"; exit 0; }

          git commit -m "journal: [$TRADING_ENV] evaluation $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Rebase + retry push to avoid 'fetch first' failures (race conditions)
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin HEAD:main && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done

  journal:
    name: Daily Journal Summary (23:00 UTC)
    runs-on: ubuntu-latest

    if: github.event_name == 'schedule' && github.event.schedule == '0 23 * * *'

    # Daily journal is explicitly paper
    environment: paper

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # rebase/pull reliability [3](https://code.alazhar.dev/actions/checkout)
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure paper env vars
        run: |
          echo "TRADING_ENV=paper" >> "$GITHUB_ENV"
          echo "APCA_BASE_URL=https://paper-api.alpaca.markets" >> "$GITHUB_ENV"
          echo "APCA_API_KEY_ID=${{ secrets.APCA_API_KEY_ID || secrets.APCA_PAPER_KEY_ID }}" >> "$GITHUB_ENV"
          echo "APCA_API_SECRET_KEY=${{ secrets.APCA_API_SECRET_KEY || secrets.APCA_PAPER_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Validate credentials
        run: |
          missing=0
          [ -z "$APCA_API_KEY_ID" ] && echo "ERROR: key empty" && missing=1
          [ -z "$APCA_API_SECRET_KEY" ] && echo "ERROR: secret empty" && missing=1
          [ $missing -eq 1 ] && exit 1

      - name: Run daily summary
        run: python scripts/run_evaluation.py --execute

      - name: Commit & push journal (safe)
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@alpaca-trading"

          git add journal/
          git diff --cached --quiet && { echo "No journal changes"; exit 0; }

          git commit -m "journal: [paper] daily summary $(date -u '+%Y-%m-%d')"

          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin HEAD:main && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done
