name: Trading Bot

# Base URLs are not secret — hardcoded here.
# Paper: https://paper-api.alpaca.markets
# Live:  https://api.alpaca.markets
#
# Required GitHub secrets:
#   APCA_PAPER_KEY_ID      — paper trading API key
#   APCA_PAPER_SECRET_KEY  — paper trading secret
#   APCA_LIVE_KEY_ID       — live trading API key
#   APCA_LIVE_SECRET_KEY   — live trading secret

on:
  schedule:
    # Hourly evaluation run — runs at :00 every hour, 24x per day (UTC)
    - cron: "0 * * * *"
    # Daily journal summary — runs at 23:00 UTC
    - cron: "0 23 * * *"
  # Manual trigger: choose environment and dry-run mode
  workflow_dispatch:
    inputs:
      environment:
        description: "Trading environment"
        required: true
        default: "paper"
        type: choice
        options:
          - paper
          - live
      dry_run:
        description: "Dry run (no orders placed)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  evaluate:
    name: Hourly Evaluation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: ${{ inputs.environment || 'paper' }}
    
    # Skip the 23:00 run here — the journal job below handles that hour
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Select environment
        run: |
          # Scheduled runs always use paper. Manual runs use the chosen environment.
          ENV="${{ inputs.environment }}"
          ENV="${ENV:-paper}"
          echo "Trading environment: $ENV"

          if [ "$ENV" = "live" ]; then
            echo "APCA_API_KEY_ID=${{ secrets.APCA_LIVE_KEY_ID }}"      >> $GITHUB_ENV
            echo "APCA_API_SECRET_KEY=${{ secrets.APCA_LIVE_SECRET_KEY }}" >> $GITHUB_ENV
            echo "APCA_BASE_URL=https://api.alpaca.markets"              >> $GITHUB_ENV
          else
            echo "APCA_API_KEY_ID=${{ secrets.APCA_PAPER_KEY_ID }}"      >> $GITHUB_ENV
            echo "APCA_API_SECRET_KEY=${{ secrets.APCA_PAPER_SECRET_KEY }}" >> $GITHUB_ENV
            echo "APCA_BASE_URL=https://paper-api.alpaca.markets"        >> $GITHUB_ENV
          fi
          echo "TRADING_ENV=$ENV" >> $GITHUB_ENV

      - name: Validate credentials
        run: |
          missing=0
          [ -z "$APCA_API_KEY_ID" ]    && echo "ERROR: API key not set for environment '$TRADING_ENV'" && missing=1
          [ -z "$APCA_API_SECRET_KEY" ] && echo "ERROR: API secret not set for environment '$TRADING_ENV'" && missing=1
          [ $missing -eq 1 ] && echo "Check your GitHub secrets under Settings → Secrets and variables → Actions" && exit 1
          echo "Credentials present. ENV=$TRADING_ENV BASE_URL=$APCA_BASE_URL"

      - name: Run evaluation
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running in dry-run mode (no orders)"
            python scripts/run_evaluation.py
          else
            echo "Running with order execution enabled"
            python scripts/run_evaluation.py --execute
          fi

      - name: Commit journal entry
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@alpaca-trading"
          git add journal/
          git diff --cached --quiet || git commit -m "journal: [$TRADING_ENV] hourly evaluation $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

  journal:
    name: Daily Journal Summary
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    if: github.event.schedule == '0 23 * * *'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Select environment
        run: |
          # Daily journal always runs on paper
          echo "APCA_API_KEY_ID=${{ secrets.APCA_PAPER_KEY_ID }}"        >> $GITHUB_ENV
          echo "APCA_API_SECRET_KEY=${{ secrets.APCA_PAPER_SECRET_KEY }}" >> $GITHUB_ENV
          echo "APCA_BASE_URL=https://paper-api.alpaca.markets"          >> $GITHUB_ENV
          echo "TRADING_ENV=paper"                                        >> $GITHUB_ENV

      - name: Validate credentials
        run: |
          missing=0
          [ -z "$APCA_API_KEY_ID" ]    && echo "ERROR: APCA_PAPER_KEY_ID secret is not set" && missing=1
          [ -z "$APCA_API_SECRET_KEY" ] && echo "ERROR: APCA_PAPER_SECRET_KEY secret is not set" && missing=1
          [ $missing -eq 1 ] && echo "Check your GitHub secrets under Settings → Secrets and variables → Actions" && exit 1
          echo "Credentials present. ENV=$TRADING_ENV BASE_URL=$APCA_BASE_URL"

      - name: Run evaluation (final hour)
        run: python scripts/run_evaluation.py --execute

      - name: Commit journal entry
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@alpaca-trading"
          git add journal/
          git diff --cached --quiet || git commit -m "journal: [$TRADING_ENV] daily summary $(date -u '+%Y-%m-%d')"
          git push
