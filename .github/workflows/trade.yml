name: Trading Bot

on:
  # PAUSED 2026-07-24 (Node cutover, all 4 parity gates passed): the Node
  # engine + Vercel Cron (src/cronRoutes.js, CRON_EXECUTE=true) is now the
  # live trading engine. schedule: is commented out, not deleted -- kept as
  # an instant rollback (uncomment + CRON_EXECUTE=false to revert) per the
  # documented cutover plan (CLAUDE.md "Node.js port"). workflow_dispatch
  # still works for a manual run if ever needed.
  # schedule:
  #    # Cost-throttled: hourly (Bug #4, 2026-07-10) -> every 8h (2026-07-20)
  #    # -> once/day (2026-07-24, pending Vercel Pro -- see CLAUDE.md
  #    # "Schedule" -- revisit for every-4h once purchased). Keep
  #    # run_evaluation.py's CADENCE_WARNING_MIN / runEvaluation.js's
  #    # CADENCE_EXPECTED_MIN in sync with this so the self-monitor doesn't
  #    # false-fire on every intentional run.
  #    - cron: '2 12 * * *'
  #    - cron: '23 21 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: "Trading environment"
        required: true
        default: "paper"
        type: choice
        options: [paper, live]
      dry_run:
        description: "Dry run (no orders placed)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# Voorkom gelijktijdige runs die allebei naar main proberen te pushen.
# Concurrency zorgt dat er max 1 run tegelijk actief/pending is per group.
concurrency:
  group: trading-bot-${{ github.ref }}
  cancel-in-progress: false

# Minimaal benodigde rechten om commits te kunnen pushen.
permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  evaluate:
    name: Evaluate
    runs-on: ubuntu-latest

    # Run voor manual dispatch, als event is schedule dan voer schedule uit) 
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '2 12 * * *')

    # Inputs bestaan alleen bij workflow_dispatch; bij schedule zijn ze null. 
    # Daarom kiezen we veilig een default:
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'paper' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0        # nodig voor rebase/pull met volledige history [3](https://code.alazhar.dev/actions/checkout)
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure trading env vars
        run: |
          # Determine runtime env: manual uses input; schedule defaults to paper.
          ENV="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'paper' }}"
          echo "TRADING_ENV=$ENV" >> "$GITHUB_ENV"

          if [ "$ENV" = "live" ]; then
            echo "APCA_BASE_URL=https://api.alpaca.markets" >> "$GITHUB_ENV"

            # Prefer “clean” env-scoped secret names if you have them:
            #   APCA_API_KEY_ID / APCA_API_SECRET_KEY
            echo "APCA_API_KEY_ID=${{ secrets.APCA_LIVE_KEY_ID }}" >> "$GITHUB_ENV"
            echo "APCA_API_SECRET_KEY=${{ secrets.APCA_LIVE_SECRET_KEY }}" >> "$GITHUB_ENV"
          else
            echo "APCA_BASE_URL=https://paper-api.alpaca.markets" >> "$GITHUB_ENV"
            echo "APCA_API_KEY_ID=${{ secrets.APCA_PAPER_KEY_ID }}" >> "$GITHUB_ENV"
            echo "APCA_API_SECRET_KEY=${{ secrets.APCA_PAPER_SECRET_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Validate credentials
        run: |
          missing=0
          [ -z "$APCA_API_KEY_ID" ] && echo "ERROR: APCA_API_KEY_ID is empty" && missing=1
          [ -z "$APCA_API_SECRET_KEY" ] && echo "ERROR: APCA_API_SECRET_KEY is empty" && missing=1
          [ -z "$APCA_BASE_URL" ] && echo "ERROR: APCA_BASE_URL is empty" && missing=1
          [ $missing -eq 1 ] && exit 1
          echo "Credentials present. ENV=$TRADING_ENV BASE_URL=$APCA_BASE_URL"

      - name: Run evaluation
        run: |
          DRY="${{ inputs.dry_run || 'false' }}"
          if [ "$DRY" = "true" ]; then
            echo "Dry run: no orders"
            python scripts/run_evaluation.py
          else
            echo "Execute enabled, orders will be placed"
            python scripts/run_evaluation.py --execute
          fi

      - name: Commit & push journal + position state (safe)
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@alpaca-trading"

          # Only commit when there are changes.
          # Bug #1 (P0, 2026-07-10): data/positions_state.json was never
          # committed, so every fresh checkout reset trailing-stop HWMs,
          # partial-TP flags, and entry clocks — the AAVE partial TP re-fired
          # on 6 consecutive evaluations. The state file must persist with
          # the journal.
          git add journal/ data/positions_state.json
          git diff --cached --quiet && { echo "No journal changes"; exit 0; }

          git commit -m "journal: [$TRADING_ENV] evaluation $(date -u '+%Y-%m-%d %H:%M UTC')"

          # Rebase + retry push to avoid 'fetch first' failures (race conditions)
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin HEAD:main && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done

  journal:
    name: Daily Journal Summary
    runs-on: ubuntu-latest

    if: github.event_name == 'schedule' && github.event.schedule == '23 21 * * *'

    # Daily journal is explicitly paper
    environment: paper

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0        # rebase/pull reliability
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure paper env vars
        run: |
          echo "TRADING_ENV=paper" >> "$GITHUB_ENV"
          echo "APCA_BASE_URL=https://paper-api.alpaca.markets" >> "$GITHUB_ENV"
          echo "APCA_API_KEY_ID=${{ secrets.APCA_PAPER_KEY_ID }}" >> "$GITHUB_ENV"
          echo "APCA_API_SECRET_KEY=${{ secrets.APCA_PAPER_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Validate credentials
        run: |
          missing=0
          [ -z "$APCA_API_KEY_ID" ] && echo "ERROR: APCA_API_KEY_ID is empty" && missing=1
          [ -z "$APCA_API_SECRET_KEY" ] && echo "ERROR: APCA_API_SECRET_KEY is empty" && missing=1
          [ -z "$APCA_BASE_URL" ] && echo "ERROR: APCA_BASE_URL is empty" && missing=1
          [ $missing -eq 1 ] && exit 1
          echo "Credentials present. ENV=$TRADING_ENV BASE_URL=$APCA_BASE_URL"
          
      # Bug #4 (2026-07-10): this job used to run a second evaluation, so the
      # "daily summary" commits contained no P&L at all. The hourly evaluate
      # job (23:23 UTC) covers trading; this job writes the closing summary.
      - name: Run daily summary
        run: python scripts/daily_summary.py

      - name: Commit & push journal (safe)
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@alpaca-trading"

          git add journal/
          git diff --cached --quiet && { echo "No journal changes"; exit 0; }

          git commit -m "journal: [paper] daily summary $(date -u '+%Y-%m-%d')"

          for i in 1 2 3; do
            git pull --rebase --autostash origin main && \
            git push origin HEAD:main && break
            echo "Push failed, retrying ($i/3)..."
            sleep 2
          done
