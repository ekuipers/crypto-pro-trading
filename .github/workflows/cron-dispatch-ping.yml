name: Cron Dispatch Ping

# Vercel Hobby (the plan this project is on) only allows once-daily cron
# schedules, but the dashboard's adjustable per-job schedule
# (src/cronSchedule.js, cron_config.hour_utc) needs an hourly check to
# actually take effect at whatever hour is configured -- see CLAUDE.md's
# "Cron cutover" section. This is the documented Hobby-plan fallback: does
# nothing but hit the already-deployed /api/cron/dispatch endpoint hourly
# with the CRON_SECRET bearer token -- no Python, no checkout, no git
# commit, negligible Actions minutes. vercel.json's own once-daily cron to
# the same endpoint is a redundant safety net in case this workflow has an
# outage, not the primary driver of the adjustable schedule.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# Own group (not shared with trading-bot-*, which gates the git-committing
# workflows) -- this never pushes, but still shouldn't pile up overlapping
# runs if one call hangs.
concurrency:
  group: cron-dispatch-ping
  cancel-in-progress: false

jobs:
  ping:
    name: Ping dispatcher
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit /api/cron/dispatch
        run: |
          curl -sf --max-time 60 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://crypto-pro-trading-bice.vercel.app/api/cron/dispatch
