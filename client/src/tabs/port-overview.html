    <div id="page-port-overview" class="page">
      <div id="portErrorBox" class="error" style="display:none"></div>

      <!-- Account cards -->
      <section>
        <div class="section-title">Account Overview</div>
        <div class="cards">
          <div class="card"><div class="card-label">Equity</div><div class="card-value" id="portStatEquity"><span class="spinner"></span></div></div>
          <div class="card"><div class="card-label">Cash</div><div class="card-value" id="portStatCash"></div></div>
          <div class="card"><div class="card-label">Buying Power</div><div class="card-value" id="portStatBP"></div></div>
          <div class="card"><div class="card-label">Portfolio Value</div><div class="card-value" id="portStatPortfolio"></div></div>
          <div class="card"><div class="card-label">Unrealized P&amp;L</div><div class="card-value" id="portStatUnrealPL"></div><div class="card-sub" id="portStatUnrealPct"></div></div>
          <div class="card"><div class="card-label">Today's P&amp;L</div><div class="card-value" id="portStatDayPL"></div><div class="card-sub" id="portStatDayPct"></div></div>
        </div>
      </section>

      <!-- Portfolio chart -->
      <section>
        <div class="chart-card">
          <div class="chart-header">
            <div>
              <div class="chart-title">Portfolio Performance</div>
              <div class="chart-meta" id="portChartMeta">—</div>
            </div>
            <div class="period-btns">
              <button class="port-period-btn"        data-p="1D" data-tf="5Min" onclick="portChangePeriod(this)">1D</button>
              <button class="port-period-btn"        data-p="1W" data-tf="1H"   onclick="portChangePeriod(this)">1W</button>
              <button class="port-period-btn active" data-p="1M" data-tf="1D"   onclick="portChangePeriod(this)">1M</button>
              <button class="port-period-btn"        data-p="3M" data-tf="1D"   onclick="portChangePeriod(this)">3M</button>
              <button class="port-period-btn"        data-p="1A" data-tf="1D"   onclick="portChangePeriod(this)">1Y</button>
            </div>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="portPortfolioChart"></canvas>
          </div>
        </div>
      </section>

      <!-- Open Positions -->
      <section>
        <div class="section-title">Open Positions (<span id="portPosCount">–</span>)</div>
        <div class="table-wrap">
          <table>
            <thead id="portPosHead"><tr>
              <th class="port-sortable"       data-key="symbol"                 data-tip="Trading pair symbol" onclick="portSortPos('symbol')">Symbol <span class="sort-icon">⇅</span></th>
              <th class="port-sortable right" data-key="qty"                    data-tip="Number of units held" onclick="portSortPos('qty')">Qty <span class="sort-icon">⇅</span></th>
              <th class="port-sortable right" data-key="avg_entry_price"        data-tip="Average cost per unit when position was opened" onclick="portSortPos('avg_entry_price')">Entry Price <span class="sort-icon">⇅</span></th>
              <th class="port-sortable right" data-key="current_price"          data-tip="Latest market price per unit" onclick="portSortPos('current_price')">Current Price <span class="sort-icon">⇅</span></th>
              <th class="port-sortable right" data-key="market_value"           data-tip="Current market value (qty × current price)" onclick="portSortPos('market_value')">Market Value <span class="sort-icon">⇅</span></th>
              <th class="port-sortable right" data-key="unrealized_pl"          data-tip="Unrealized profit/loss in dollars" onclick="portSortPos('unrealized_pl')">Unrealized P&amp;L <span class="sort-icon">⇅</span></th>
              <th class="port-sortable right" data-key="unrealized_plpc"        data-tip="Unrealized P&L as % of cost basis" onclick="portSortPos('unrealized_plpc')">Unrealized % <span class="sort-icon">⇅</span></th>
              <th class="port-sortable right" data-key="unrealized_intraday_pl" data-tip="Today's profit/loss since session open" onclick="portSortPos('unrealized_intraday_pl')">Today P&amp;L <span class="sort-icon">⇅</span></th>
              <th data-tip="Open a paper limit-order ticket for this symbol">Trade</th>
            </tr></thead>
            <tbody id="portPositionsBody">
              <tr><td colspan="9" class="placeholder"><span class="spinner"></span> Loading positions…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </div><!-- /page-port-overview -->
