  <div id="tradeModalBackdrop" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">Execute Paper Trade</div>
          <div class="small" id="tradeModalSymbol">—</div>
        </div>
        <button class="btn" onclick="closeTradeModal()">✕</button>
      </div>

      <div class="modal-body">
        <div id="tradeModeWarning" class="trade-warning">
          This ticket only submits paper-mode limit orders. Live-mode execution is blocked.
        </div>

        <input type="hidden" id="tradeSymbol">

        <div class="form-grid">
          <div>
            <label>Side</label>
            <select id="tradeSide">
              <option value="buy">Buy</option>
              <option value="sell">Sell</option>
            </select>
          </div>

          <div>
            <label>Quantity</label>
            <input id="tradeQty" type="number" min="0" step="0.000001" placeholder="0.001">
          </div>

          <div>
            <label>Limit Price</label>
            <input id="tradeLimitPrice" type="number" min="0" step="0.000001" placeholder="Price">
          </div>

          <div>
            <label>Time in Force</label>
            <select id="tradeTif">
              <option value="gtc">GTC</option>
              <option value="day">DAY</option>
            </select>
          </div>
        </div>

        <div class="trade-summary" id="tradeSummary">
          Fill in quantity and limit price to see estimated notional value.
        </div>

        <div class="small" id="tradeCapWarning" style="display:none;margin-top:8px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;line-height:1.6"></div>

        <div class="small" id="tradeRrInfo" style="display:none;margin-top:8px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;line-height:1.6"></div>

        <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
          <div class="small" style="margin-bottom:8px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">ATR Position Sizer (1% risk rule)</div>
          <div class="form-grid" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
            <div><label>Equity ($)</label><input id="sizerEquity" type="number" placeholder="e.g. 100000" oninput="calcSizer()"></div>
            <div><label>ATR</label><input id="sizerAtr" type="number" step="0.000001" placeholder="e.g. 500" oninput="calcSizer()"></div>
            <div><label>Ask Price ($)</label><input id="sizerAsk" type="number" step="0.000001" placeholder="e.g. 80000" oninput="calcSizer()"></div>
            <div><label>Cap % equity</label><input id="sizerCap" type="number" step="1" value="5" oninput="calcSizer()"></div>
          </div>
          <div class="trade-summary" id="sizerResult" style="margin-top:8px">Enter equity, ATR and ask to calculate suggested quantity.</div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn" onclick="closeTradeModal()">Cancel</button>
        <button class="btn btn-green" onclick="submitPaperTrade()">Submit Paper Limit Order</button>
      </div>
    </div>
  </div>

  <!-- ══════════════ DAILY JOURNAL MODAL ══════════════ -->
  <div id="journalDocBackdrop" class="modal-backdrop">
    <div class="modal" style="width:min(820px,100%);max-height:90vh;display:flex;flex-direction:column">
      <div class="modal-header">
        <div>
          <div class="modal-title">📓 Daily Journal</div>
          <div class="small" id="journalDocSub" style="color:var(--muted)">—</div>
        </div>
        <button class="btn" onclick="closeJournalDoc()">✕</button>
      </div>
      <div class="modal-body" style="overflow-y:auto;flex:1">
        <pre id="journalDocText" style="white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.5;margin:0;color:var(--text)"></pre>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="copyJournalDoc()">📋 Copy</button>
        <button class="btn" onclick="closeJournalDoc()">Close</button>
        <button class="btn btn-green" onclick="downloadJournalDoc()">↓ Download .md</button>
      </div>
    </div>
  </div>

  <!-- ══════════════ ACCOUNT / SIGN-IN MODAL (Suite SSO) ══════════════ -->
  <div id="authModalBackdrop" class="modal-backdrop">
    <div class="modal" id="authModalBody" style="width:min(420px,100%)"></div>
  </div>

  <div id="tooltip"></div>
